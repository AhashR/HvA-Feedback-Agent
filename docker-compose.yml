# Docker Compose for Automated Essay Grader

version: '3.8'

services:
  essay-grader:
    build: .
    container_name: automated-essay-grader
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_TITLE=HvA Learning Story Feedback Agent
      - WORKSPACE_ATTRIBUTION=HvA Feedback Agent
      - DEVELOPER_NAME=HvA Feedback Agent Team
    volumes:
      - ./data/outputs:/app/data/outputs
      - ./logs:/app/logs
      - ./data/rubrics:/app/data/rubrics:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - essay-grader-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: essay-grader-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - essay-grader
    restart: unless-stopped
    networks:
      - essay-grader-network
    profiles:
      - production

networks:
  essay-grader-network:
    driver: bridge

volumes:
  essay-outputs:
    driver: local
  essay-logs:
    driver: local

# Metadata
x-metadata:
  workspace: "HvA Feedback Agent"
  author: "HvA Feedback Agent Team"
  description: "AI-powered feedback for HvA learning stories"
  version: "1.0.0"